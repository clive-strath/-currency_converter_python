<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .currency-flag {
            width: 24px;
            height: 18px;
            margin-right: 8px;
            border-radius: 2px;
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-3">
                <i class="fas fa-exchange-alt mr-3"></i>Currency Converter
            </h1>
            <p class="text-white/80 text-lg">Real-time exchange rates for major world currencies</p>
        </header>

        <main class="max-w-4xl mx-auto">
            <!-- Converter Card -->
            <section class="glass-effect rounded-2xl shadow-2xl p-6 md:p-8 mb-8">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6">
                    <i class="fas fa-calculator mr-2 text-purple-600"></i>Convert Currency
                </h2>
                
                <form id="converterForm" class="space-y-6">
                    <div class="grid md:grid-cols-2 gap-6">
                        <!-- Amount Input -->
                        <div>
                            <label for="amount" class="block text-sm font-medium text-gray-700 mb-2">
                                Amount
                            </label>
                            <input type="number" 
                                   id="amount" 
                                   name="amount" 
                                   value="1.00" 
                                   step="0.01" 
                                   min="0.01"
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                                   required>
                        </div>

                        <!-- Base Currency -->
                        <div>
                            <label for="base_currency" class="block text-sm font-medium text-gray-700 mb-2">
                                From Currency
                            </label>
                            <select id="base_currency" 
                                    name="base_currency" 
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                                    required>
                                <option value="">Select currency...</option>
                                {% for currency in currencies %}
                                <option value="{{ currency }}">{{ currency }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Target Currency -->
                        <div>
                            <label for="target_currency" class="block text-sm font-medium text-gray-700 mb-2">
                                To Currency
                            </label>
                            <select id="target_currency" 
                                    name="target_currency" 
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                                    required>
                                <option value="">Select currency...</option>
                                {% for currency in currencies %}
                                <option value="{{ currency }}">{{ currency }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Convert Button -->
                        <div class="flex items-end">
                            <button type="submit" 
                                    id="convertBtn"
                                    class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold py-3 px-6 rounded-lg hover:from-purple-700 hover:to-indigo-700 transition-all duration-200 transform hover:scale-105 shadow-lg">
                                <i class="fas fa-exchange-alt mr-2"></i>Convert
                            </button>
                        </div>
                    </div>
                </form>

                <!-- Result Display -->
                <div id="resultContainer" class="hidden mt-8 p-6 bg-gradient-to-r from-green-50 to-emerald-50 rounded-lg border border-green-200 fade-in">
                    <h3 class="text-lg font-semibold text-gray-800 mb-3">
                        <i class="fas fa-check-circle text-green-600 mr-2"></i>Conversion Result
                    </h3>
                    <div id="resultContent" class="text-gray-700"></div>
                </div>

                <!-- Error Display -->
                <div id="errorContainer" class="hidden mt-8 p-6 bg-gradient-to-r from-red-50 to-pink-50 rounded-lg border border-red-200 fade-in">
                    <h3 class="text-lg font-semibold text-red-800 mb-2">
                        <i class="fas fa-exclamation-triangle text-red-600 mr-2"></i>Error
                    </h3>
                    <div id="errorContent" class="text-red-700"></div>
                </div>
            </section>

            <!-- Exchange Rates Table -->
            <section class="glass-effect rounded-2xl shadow-2xl p-6 md:p-8">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6">
                    <i class="fas fa-chart-line mr-2 text-purple-600"></i>Live Exchange Rates
                </h2>
                
                <div class="mb-4">
                    <label for="ratesBase" class="block text-sm font-medium text-gray-700 mb-2">
                        Base Currency for Rates Table
                    </label>
                    <select id="ratesBase" 
                            class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all">
                        {% for currency in currencies %}
                        <option value="{{ currency }}">{{ currency }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div id="ratesContainer" class="overflow-x-auto">
                    <div class="text-center py-8 text-gray-500">
                        <i class="fas fa-sync-alt fa-spin text-2xl mb-3"></i>
                        <p>Loading exchange rates...</p>
                    </div>
                </div>
            </section>
        </main>

        <footer class="text-center mt-12 text-white/70 text-sm">
            <p>Powered by FreeCurrencyAPI | Real-time exchange rates</p>
        </footer>
    </div>

    <script>
        // Currency converter functionality
        document.getElementById('converterForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const convertBtn = document.getElementById('convertBtn');
            const resultContainer = document.getElementById('resultContainer');
            const errorContainer = document.getElementById('errorContainer');
            
            // Hide previous results/errors
            resultContainer.classList.add('hidden');
            errorContainer.classList.add('hidden');
            
            // Show loading state
            convertBtn.innerHTML = '<div class="loading-spinner inline-block mr-2"></div>Converting...';
            convertBtn.disabled = true;
            
            const formData = new FormData(this);
            
            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('resultContent').innerHTML = `
                        <div class="text-center">
                            <div class="text-3xl font-bold text-gray-800 mb-2">
                                ${data.amount.toFixed(2)} ${data.base_currency} = 
                                <span class="text-green-600">${data.result.toFixed(4)} ${data.target_currency}</span>
                            </div>
                            <div class="text-sm text-gray-600">
                                Exchange Rate: 1 ${data.base_currency} = ${(data.result / data.amount).toFixed(4)} ${data.target_currency}
                            </div>
                        </div>
                    `;
                    resultContainer.classList.remove('hidden');
                } else {
                    document.getElementById('errorContent').textContent = data.error;
                    errorContainer.classList.remove('hidden');
                }
            } catch (error) {
                document.getElementById('errorContent').textContent = 'Network error. Please try again.';
                errorContainer.classList.remove('hidden');
            } finally {
                convertBtn.innerHTML = '<i class="fas fa-exchange-alt mr-2"></i>Convert';
                convertBtn.disabled = false;
            }
        });

        // Load exchange rates table
        async function loadRates(baseCurrency = 'USD') {
            const ratesContainer = document.getElementById('ratesContainer');
            
            ratesContainer.innerHTML = `
                <div class="text-center py-8 text-gray-500">
                    <i class="fas fa-sync-alt fa-spin text-2xl mb-3"></i>
                    <p>Loading exchange rates...</p>
                </div>
            `;
            
            try {
                const response = await fetch(`/rates/${baseCurrency}`);
                const data = await response.json();
                
                if (data.success) {
                    const rates = data.rates;
                    let tableHTML = `
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="border-b border-gray-200">
                                    <th class="text-left py-3 px-4 font-semibold text-gray-700">Currency</th>
                                    <th class="text-right py-3 px-4 font-semibold text-gray-700">Exchange Rate</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    
                    for (const [currency, rate] of Object.entries(rates)) {
                        if (currency !== baseCurrency) {
                            tableHTML += `
                                <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                                    <td class="py-3 px-4 font-medium text-gray-800">${currency}</td>
                                    <td class="py-3 px-4 text-right text-gray-700">${rate.toFixed(4)}</td>
                                </tr>
                            `;
                        }
                    }
                    
                    tableHTML += '</tbody></table>';
                    ratesContainer.innerHTML = tableHTML;
                } else {
                    ratesContainer.innerHTML = `
                        <div class="text-center py-8 text-red-500">
                            <i class="fas fa-exclamation-triangle text-2xl mb-3"></i>
                            <p>Failed to load exchange rates</p>
                        </div>
                    `;
                }
            } catch (error) {
                ratesContainer.innerHTML = `
                    <div class="text-center py-8 text-red-500">
                        <i class="fas fa-exclamation-triangle text-2xl mb-3"></i>
                        <p>Network error. Please try again.</p>
                    </div>
                `;
            }
        }

        // Load rates on page load and when base currency changes
        document.addEventListener('DOMContentLoaded', function() {
            loadRates();
            
            document.getElementById('ratesBase').addEventListener('change', function() {
                loadRates(this.value);
            });
        });
    </script>
</body>
</html>
